<!-- Navigation Bar -->
<nav class="navbar" *ngIf="isAuthenticated$ | async">
  <div class="navbar-container">
    <div class="navbar-brand">
      <h1>Cyber Phishing Simulator</h1>
    </div>

    <div class="navbar-menu">
      <div class="navbar-user-info">
        <span *ngIf="currentUser$ | async as user" class="user-display">
          👤 {{ user.username }} ({{ user.role | uppercase }})
        </span>
      </div>

      <div class="navbar-links">
        <button
          *ngIf="(currentUser$ | async)?.role === 'admin'"
          (click)="goToAdminDashboard()"
          class="nav-button"
        >
          Admin Dashboard
        </button>
        <button (click)="goToUserDashboard()" class="nav-button">
          User Dashboard
        </button>
        <button (click)="logout()" class="nav-button logout-btn">Logout</button>
      </div>
    </div>
  </div>
</nav>

<!-- Main Content -->
<div class="app-container">
  <router-outlet></router-outlet>
</div>

<style>
  :host {
    font-family:
      -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
      sans-serif;
    font-size: 14px;
    color: #333;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .navbar {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 0;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  .navbar-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .navbar-brand h1 {
    margin: 0;
    font-size: 24px;
    font-weight: 600;
  }

  .navbar-menu {
    display: flex;
    align-items: center;
    gap: 30px;
  }

  .navbar-user-info {
    font-size: 14px;
    font-weight: 500;
  }

  .user-display {
    display: inline-block;
    padding: 6px 12px;
    background-color: rgba(255, 255, 255, 0.2);
    border-radius: 4px;
  }

  .navbar-links {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .nav-button {
    padding: 8px 16px;
    background-color: rgba(255, 255, 255, 0.2);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.3s ease;

    &:hover {
      background-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-1px);
    }

    &:active {
      transform: translateY(0);
    }
  }

  .logout-btn {
    background-color: rgba(255, 107, 107, 0.3);
    border-color: rgba(255, 107, 107, 0.5);

    &:hover {
      background-color: rgba(255, 107, 107, 0.5);
    }
  }

  .app-container {
    min-height: calc(100vh - 60px);
  }

  @media (max-width: 768px) {
    .navbar-container {
      flex-direction: column;
      gap: 15px;
    }

    .navbar-menu {
      width: 100%;
      flex-direction: column;
      gap: 10px;
    }

    .navbar-links {
      width: 100%;
      flex-direction: column;
    }

    .nav-button {
      width: 100%;
    }
  }
</style>
